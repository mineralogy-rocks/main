services:

    nginx-dev:
        container_name: nginx-dev
        restart: unless-stopped
        image: nginx:stable-alpine
        ports:
            - "80:80"
        command: >
            /bin/sh -c "envsubst '$${DOMAIN}' < /etc/nginx/nginx.template > /etc/nginx/nginx.conf && exec nginx -g 'daemon off;'"
        env_file:
            - ./.env
        volumes:
            - ./nginx/nginx.template:/etc/nginx/nginx.template:ro

            - ./_data/log:/var/log/nginx
            - ./_data/media:/var/www/media
            - ./_data/static:/var/www/static
        labels:
            - dev.orbstack.domains=api.mineralogy.rocks.local,supabase.gemsla.be.local

    db:
        container_name: db
        image: postgres:17.0
        restart: unless-stopped
        environment:
            - POSTGRES_USER=${DB_USER}
            - POSTGRES_PASSWORD=${DB_PASSWORD}
            - POSTGRES_DB=${DB_NAME}
            - POSTGRES_PORT=5432
        ports:
            - "5432:5432"
        volumes:
            - db:/var/lib/postgresql/data/

    backend:
        container_name: backend
        build:
            context: ../backend
            dockerfile: ./compose/local/backend/Dockerfile
        command: /start
        restart: unless-stopped
        links:
            - 'nginx-dev:api.dev.mindat.org'
        depends_on:
            - db
            - nginx-dev
        env_file:
            - ../backend/.envs/.local/.backend
            - ../backend/.envs/.prod/.do
        environment:
            - POSTGRES_DB=${DB_NAME}
            - POSTGRES_USER=${DB_USER}
            - POSTGRES_PASSWORD=${DB_PASSWORD}
            - POSTGRES_HOST=db
            - POSTGRES_PORT=5432
        volumes:
            - ../backend:/app

            - ./_data/media:/app/media
            - ./_data/static:/app/static
        ports:
            - "8000:8000"
        labels:
            - dev.orbstack.domains=*.local

    erebus:
        restart: unless-stopped
        depends_on:
            - backend
        links:
            - 'nginx-dev:api.${DOMAIN}.local'
        build:
            context: ../erebus
            dockerfile: Dockerfile
        container_name: erebus-app
        volumes:
            - ../erebus:/app
            - /app/.venv
        environment:
            - APP_ENV=local

            - POSTGRES_HOST=db
            - POSTGRES_PORT=5432
        tty: true
        stdin_open: true

    keep-rocking:
        restart: unless-stopped
        depends_on:
             - backend
        links:
             - 'nginx-dev:api.${DOMAIN}.local'
        build:
            context: ../keep-rocking
            dockerfile: dev.Dockerfile
        env_file:
            - ../keep-rocking/.envs/.local/.env
            - ../keep-rocking/.envs/.prod/.env
        stdin_open: true
        volumes:
            - node_modules:/app/node_modules
            - ../keep-rocking:/app
            - ./_data/static:/var/www/static
        ports:
            - "8080:3000"
        labels:
            - dev.orbstack.domains=mineralogy.rocks.local

    gems-labe:
        container_name: gems-labe
        restart: unless-stopped
        depends_on:
          - nginx-dev
        build:
            context: ../gems-labe
            dockerfile: dev.Dockerfile
        env_file:
            - ../gems-labe/.envs/.local/.env
        environment:
            - NEXT_PUBLIC_SITE_URL=http://gemsla.be.local
            - NEXT_PUBLIC_SUPABASE_URL=http://supabase.gemsla.be.local
        stdin_open: true
        volumes:
            - gems_labe_node_modules:/app/node_modules
            - ../gems-labe:/app
            - ./_data/static:/var/www/static
        ports:
            - "8081:8080"
        labels:
            - dev.orbstack.domains=gemsla.be.local

volumes:
    node_modules:
    gems_labe_node_modules:
    db:
